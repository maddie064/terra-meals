<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TerraMeals</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,800;1,300;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --card: #211f1b;
      --border: #2e2b25;
      --text: #f0ebe3;
      --muted: #8a8070;
      --accent: #d4a853;
      --accent2: #c0392b;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(15,14,12,0.92);
      backdrop-filter: blur(10px);
      z-index: 50;
    }
    .nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--text); font-style: italic; }
    .back-btn {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      transition: all 0.18s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .back-btn.visible { display: flex; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 4rem 2rem 3rem;
    }
    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p {
      color: var(--muted);
      margin-top: 1rem;
      font-size: 1rem;
      font-weight: 300;
    }

    /* SEARCH */
    .search-wrap {
      max-width: 480px;
      margin: 0 auto 3rem;
      padding: 0 1.5rem;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.9rem 1.2rem 0.9rem 2.8rem;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .si {
      position: absolute;
      left: 2.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    /* VIEWS */
    #view-regions, #view-recipes { transition: opacity 0.3s; }
    .hidden { display: none !important; }

    /* REGION GRID */
    .section-label {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .region-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    .region-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      cursor: pointer;
      transition: all 0.22s;
      text-align: center;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .region-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212,168,83,0.06), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .region-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .region-card:hover::before { opacity: 1; }
    .region-flag { font-size: 3rem; margin-bottom: 0.8rem; }
    .region-name {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .region-sub { font-size: 0.78rem; color: var(--muted); }
    .region-count {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.2rem 0.7rem;
      background: rgba(212,168,83,0.12);
      color: var(--accent);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* RECIPE VIEW */
    #view-recipes { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .region-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .region-header .flag { font-size: 2.5rem; }
    .region-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 800;
    }
    .region-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
    }
    .recipe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.22s;
      animation: fadeUp 0.35s ease both;
    }
    .recipe-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .recipe-emoji-wrap {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .recipe-emoji-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(212,168,83,0.15), transparent 60%);
    }
    .recipe-card-body { padding: 1.2rem; }
    .recipe-card-name {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .recipe-card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.8rem; }
    .recipe-card-meta { display: flex; gap: 1rem; font-size: 0.78rem; color: var(--muted); }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,9,8,0.8);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 580px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: popIn 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-top {
      background: var(--card);
      padding: 2rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-emoji { font-size: 4rem; }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      font-weight: 800;
      margin-top: 0.5rem;
    }
    .modal-origin {
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 0.3rem;
      letter-spacing: 0.5px;
    }
    .modal-meta-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    /* TABS */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { overflow-y: auto; padding: 1.8rem; flex: 1; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* HISTORY TAB */
    .history-era {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .history-era:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .era-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .era-label { font-size: 0.72rem; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.3rem; }
    .era-text { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

    /* INGREDIENTS TAB */
    .ing-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .ing-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.88rem;
    }
    .ing-item .check {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 0.7rem;
    }
    .ing-item.checked .check { background: var(--accent); border-color: var(--accent); color: #000; }
    .ing-item.checked span { text-decoration: line-through; color: var(--muted); }
    .ing-amount { color: var(--accent); font-weight: 500; min-width: 80px; font-size: 0.82rem; }

    /* DIRECTIONS TAB */
    .step {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 1.4rem;
      align-items: flex-start;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      width: 30px; height: 30px;
      background: rgba(212,168,83,0.12);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .step p { font-size: 0.9rem; line-height: 1.7; color: #c8c0b0; margin-top: 3px; }
    .step-tip {
      margin-top: 0.5rem;
      padding: 0.5rem 0.8rem;
      background: rgba(212,168,83,0.08);
      border-left: 2px solid var(--accent);
      border-radius: 0 6px 6px 0;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 2.4rem; }
      .region-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Terra <span>Meals</span></div>
  <button class="back-btn" id="back-btn" onclick="showRegions()">← All Regions</button>
</nav>

<!-- REGION VIEW -->
<div id="view-regions">
  <div class="hero">
    <div class="hero-eyebrow">Taste the world</div>
    <h1>Recipes from <em>Every</em><br>Corner of the Globe</h1>
    <p>Pick a country to start cooking</p>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="region-search" placeholder="Search countries or dishes…" oninput="filterRegions()"/>
  </div>
  <p class="section-label">Choose a country</p>
  <div class="region-grid" id="region-grid"></div>
</div>

<!-- RECIPE VIEW -->
<div id="view-recipes" class="hidden">
  <div class="region-header" id="region-header"></div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
const data = {
  regions: [
    {
      id: "japan",
      name: "Japan",
      flag: "🇯🇵",
      region: "East Asia",
      description: "Precision, balance, and umami",
    },
    {
      id: "italy",
      name: "Italy",
      flag: "🇮🇹",
      region: "Southern Europe",
      description: "Simple ingredients, extraordinary results",
    },
    {
      id: "mexico",
      name: "Mexico",
      flag: "🇲🇽",
      region: "North America",
      description: "Bold, layered, and vibrant",
    },
    {
      id: "india",
      name: "India",
      flag: "🇮🇳",
      region: "South Asia",
      description: "Spice, warmth, and complexity",
    },
    {
      id: "france",
      name: "France",
      flag: "🇫🇷",
      region: "Western Europe",
      description: "Technique, richness, and elegance",
    },
    {
      id: "ethiopia",
      name: "Ethiopia",
      flag: "🇪🇹",
      region: "East Africa",
      description: "Communal, rich, and aromatic",
    },
  ],
  recipes: {
    japan: [
      {
        name: "Ramen",
        emoji: "🍜",
        desc: "Rich broth noodle soup with toppings",
        time: "3 hrs",
        servings: 2,
        difficulty: "Medium",
        history: [
          { era: "Origins", text: "Ramen traces its roots to Chinese noodle dishes brought to Japan in the late 19th century. Chinese immigrants sold noodles from street stalls in port cities like Yokohama and Kobe." },
          { era: "Post-War Era (1945–1960s)", text: "After WWII, wheat flour flooded Japan via US aid. Street vendors sold cheap ramen everywhere, making it a symbol of post-war recovery and resilience." },
          { era: "Modern Era", text: "Today ramen is a cultural institution. Regional styles — Sapporo miso, Hakata tonkotsu, Tokyo shoyu — have cult followings, and ramen shops are treated with the reverence of fine dining." }
        ],
        ingredients: [
          { amount: "2 portions", name: "fresh ramen noodles" },
          { amount: "1.5L", name: "pork or chicken broth" },
          { amount: "3 tbsp", name: "soy sauce" },
          { amount: "2 tbsp", name: "miso paste" },
          { amount: "200g", name: "chashu pork belly" },
          { amount: "2", name: "soft-boiled eggs (marinated)" },
          { amount: "2 sheets", name: "nori (seaweed)" },
          { amount: "4", name: "spring onions, sliced" },
          { amount: "100g", name: "bean sprouts" },
          { amount: "1 tbsp", name: "sesame oil" },
        ],
        steps: [
          { text: "Make the broth: simmer pork bones and aromatics (ginger, garlic, onion) for at least 2 hours.", tip: "The longer you simmer, the richer the broth. Skim foam regularly in the first 20 minutes." },
          { text: "Prepare chashu: roll pork belly tightly, tie with string, and braise in soy sauce, mirin, and sake for 90 minutes. Slice into rounds when cooled." },
          { text: "Marinate eggs: soft boil eggs for 6.5 minutes, peel, and soak overnight in soy sauce, mirin, and water." },
          { text: "Build the tare (seasoning): mix soy sauce and miso paste. Add 2–3 tbsp to the bottom of each bowl." },
          { text: "Cook noodles according to package. Drain and add to bowls over the tare." },
          { text: "Ladle hot broth over noodles. Arrange toppings: chashu, halved egg, nori, spring onions, bean sprouts.", tip: "Add a few drops of sesame oil on top just before serving." },
        ]
      },
      {
        name: "Onigiri",
        emoji: "🍙",
        desc: "Rice balls with savory fillings",
        time: "20 min",
        servings: 4,
        difficulty: "Easy",
        history: [
          { era: "Origins (700s AD)", text: "Onigiri appear in the Murasaki Shikibu diary from the Heian Period. They were eaten as portable meals by Japanese nobles and soldiers." },
          { era: "Edo Period (1600–1868)", text: "Onigiri became common food for travelers and workers. Wrapped in dried seaweed, they could be carried all day without spoiling." },
          { era: "Today", text: "Convenience stores in Japan sell millions of onigiri daily. Over 100 fillings exist, from tuna mayo to pickled plum." }
        ],
        ingredients: [
          { amount: "2 cups", name: "Japanese short-grain rice" },
          { amount: "1 tsp", name: "salt" },
          { amount: "2 cans", name: "tuna in oil" },
          { amount: "2 tbsp", name: "Japanese mayo" },
          { amount: "4 sheets", name: "nori, cut into strips" },
          { amount: "1 tbsp", name: "sesame seeds" },
        ],
        steps: [
          { text: "Cook rice and let it cool slightly — it should be warm but not steaming hot when you handle it." },
          { text: "Mix tuna with mayo and a pinch of salt for the filling." },
          { text: "Wet your hands with water and rub a little salt on them to season the rice." },
          { text: "Take a handful of rice, flatten it, place a spoonful of filling in the center.", tip: "Keep a bowl of salted water nearby to re-wet your hands between each onigiri." },
          { text: "Fold rice around the filling and shape into a triangle by pressing with both palms." },
          { text: "Wrap with a strip of nori and sprinkle sesame seeds on top." },
        ]
      },
      {
        name: "Miso Soup",
        emoji: "🍲",
        desc: "Warming dashi broth with miso",
        time: "15 min",
        servings: 4,
        difficulty: "Easy",
        history: [
          { era: "Origins (700s AD)", text: "Miso paste was introduced to Japan from China around the 7th century. Miso soup as a daily staple became widespread during the Kamakura period." },
          { era: "Edo Period", text: "Miso soup became the cornerstone of the traditional Japanese meal structure: rice, miso soup, and pickles. Every region developed its own miso style." },
          { era: "Global Spread", text: "Today miso soup is recognized worldwide as a symbol of Japanese cuisine, served everywhere from ramen shops to Michelin-starred restaurants." }
        ],
        ingredients: [
          { amount: "1L", name: "dashi stock (or water + dashi powder)" },
          { amount: "3 tbsp", name: "white or red miso paste" },
          { amount: "200g", name: "silken tofu, cubed" },
          { amount: "2 tbsp", name: "dried wakame seaweed" },
          { amount: "3", name: "spring onions, sliced" },
        ],
        steps: [
          { text: "Heat dashi stock in a pot over medium heat. Do not boil." },
          { text: "Rehydrate wakame in cold water for 5 minutes, then drain." },
          { text: "Dissolve miso paste into the warm stock using a ladle — never boil miso as it destroys the flavor.", tip: "Use a small strainer or whisk to fully dissolve the paste without lumps." },
          { text: "Add tofu cubes and wakame. Warm gently for 2 minutes." },
          { text: "Ladle into bowls and top with spring onions." },
        ]
      }
    ],
    italy: [
      {
        name: "Carbonara",
        emoji: "🍝",
        desc: "Pasta with egg, pecorino, and guanciale",
        time: "25 min",
        servings: 2,
        difficulty: "Medium",
        history: [
          { era: "Disputed Origins", text: "Carbonara's exact origin is hotly debated. The most credible theory places its creation in Rome during or just after WWII, when American soldiers introduced bacon and powdered eggs that were combined with pasta." },
          { era: "Roman Classic (1950s–present)", text: "By the 1950s carbonara was firmly established as a Roman dish. Strict traditionalists insist on only four ingredients: guanciale, egg yolk, pecorino romano, and black pepper. No cream, ever." },
          { era: "Global Controversy", text: "Carbonara is one of the most argued-about dishes globally. Variations with cream, peas, or chicken are common outside Italy but are considered sacrilege by Italian purists." }
        ],
        ingredients: [
          { amount: "200g", name: "spaghetti or rigatoni" },
          { amount: "150g", name: "guanciale (or pancetta)" },
          { amount: "3", name: "egg yolks" },
          { amount: "1 whole", name: "egg" },
          { amount: "80g", name: "pecorino romano, finely grated" },
          { amount: "1 tsp", name: "coarsely ground black pepper" },
          { amount: "Salt", name: "for pasta water" },
        ],
        steps: [
          { text: "Boil well-salted water. Cook pasta until al dente. Reserve 1 cup of pasta water before draining." },
          { text: "While pasta cooks, fry guanciale in a pan over medium heat until crispy and golden. No added oil needed — it renders its own fat.", tip: "Don't drain the fat — it's essential to the sauce." },
          { text: "Whisk eggs, egg yolks, and pecorino together until smooth and thick." },
          { text: "Remove guanciale pan from heat and let it cool slightly — this is critical to prevent scrambled eggs." },
          { text: "Add drained pasta to the pan and toss. Add egg mixture, tossing constantly while adding pasta water a splash at a time until silky." },
          { text: "Serve immediately with extra pecorino and a generous crack of black pepper." },
        ]
      },
      {
        name: "Tiramisu",
        emoji: "🍮",
        desc: "Coffee-soaked layers of cream and savoiardi",
        time: "30 min + chill",
        servings: 6,
        difficulty: "Easy",
        history: [

function renderRegions(filter = "") {
  const grid = document.getElementById("region-grid");
  grid.innerHTML = "";
  const query = filter.toLowerCase();
  const filtered = data.regions.filter(r =>
    r.name.toLowerCase().includes(query) ||
    r.region.toLowerCase().includes(query) ||
    (data.recipes[r.id] || []).some(rec => rec.name.toLowerCase().includes(query))
  );
  filtered.forEach((r, i) => {
    const count = (data.recipes[r.id] || []).length;
    const card = document.createElement("div");
    card.className = "region-card";
    card.style.animationDelay = `${i * 0.06}s`;
    card.innerHTML = `
      <div class="region-flag">${r.flag}</div>
      <div class="region-name">${r.name}</div>
      <div class="region-sub">${r.region}</div>
      <div class="region-sub" style="margin-top:0.2rem;font-style:italic;">${r.description}</div>
      <div class="region-count">${count} recipe${count !== 1 ? "s" : ""}</div>`;
    card.onclick = () => showRecipes(r.id);
    grid.appendChild(card);
  });
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);">No results for "${filter}"</div>`;
  }
}
 
function filterRegions() { renderRegions(document.getElementById("region-search").value); }
 
function showRecipes(regionId) {
  const region = data.regions.find(r => r.id === regionId);
  const recipes = data.recipes[regionId] || [];
  document.getElementById("view-regions").classList.add("hidden");
  document.getElementById("view-recipes").classList.remove("hidden");
  document.getElementById("back-btn").classList.add("visible");
  document.getElementById("region-header").innerHTML = `
    <div class="flag">${region.flag}</div>
    <div>
      <h2>${region.name}</h2>
      <p>${region.description} · ${recipes.length} recipe${recipes.length !== 1 ? "s" : ""}</p>
    </div>`;
  const grid = document.getElementById("recipe-grid");
  grid.innerHTML = "";
  recipes.forEach((r, i) => {
    const card = document.createElement("div");
    card.className = "recipe-card";
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="recipe-emoji-wrap">${r.emoji}</div>
      <div class="recipe-card-body">
        <div class="recipe-card-name">${r.name}</div>
        <div class="recipe-card-desc">${r.desc}</div>
        <div class="recipe-card-meta">
          <span>⏱ ${r.time}</span>
          <span>👤 ${r.servings}</span>
          <span>📊 ${r.difficulty}</span>
        </div>
      </div>`;
    card.onclick = () => openModal(r, region);
    grid.appendChild(card);
  });
}
 
function showRegions() {
  document.getElementById("view-recipes").classList.add("hidden");
  document.getElementById("view-regions").classList.remove("hidden");
  document.getElementById("back-btn").classList.remove("visible");
}
 
function openModal(recipe, region) {
  const m = document.getElementById("modal");
  m.innerHTML = `
    <div class="modal-top">
      <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
      <div class="modal-emoji">${recipe.emoji}</div>
      <div class="modal-title">${recipe.name}</div>
      <div class="modal-origin">${region.flag} ${region.name} · ${region.region}</div>
      <div class="modal-meta-row">
        <span>⏱ ${recipe.time}</span>
        <span>👤 ${recipe.servings} servings</span>
        <span>📊 ${recipe.difficulty}</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'history')">📖 History</div>
      <div class="tab" onclick="switchTab(this,'ingredients')">🛒 Ingredients</div>
      <div class="tab" onclick="switchTab(this,'directions')">👨‍🍳 Directions</div>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-history">
        ${recipe.history.map(h => `
          <div class="history-era">
            <div class="era-dot"></div>
            <div>
              <div class="era-label">${h.era}</div>
              <div class="era-text">${h.text}</div>
            </div>
          </div>`).join("")}
      </div>
      <div class="tab-panel" id="panel-ingredients">
        <div class="ing-list">
          ${recipe.ingredients.map((ing, i) => `
            <div class="ing-item" id="ing-${i}" onclick="toggleIng(${i})">
              <div class="check" id="check-${i}">✓</div>
              <div class="ing-amount">${ing.amount}</div>
              <span>${ing.name}</span>
            </div>`).join("")}
        </div>
      </div>
      <div class="tab-panel" id="panel-directions">
        ${recipe.steps.map((s, i) => `
          <div class="step">
            <div class="step-num">${i+1}</div>
            <div>
              <p>${s.text}</p>
              ${s.tip ? `<div class="step-tip">💡 ${s.tip}</div>` : ""}
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  document.getElementById("overlay").classList.add("open");
}
 
function switchTab(el, panel) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("panel-" + panel).classList.add("active");
}
 
function toggleIng(i) {
  const item = document.getElementById("ing-" + i);
  const check = document.getElementById("check-" + i);
  item.classList.toggle("checked");
  check.textContent = item.classList.contains("checked") ? "✓" : "";
}
 
function closeModal(e) {
  if (e.target === document.getElementById("overlay")) {
    document.getElementById("overlay").classList.remove("open");
  }
}
 
renderRegions();
